version: 2

sources:
  - name: nba
    description: "NBA data from external tables in Google Cloud Storage"
    tables:


      - name: raw_active_players
        description: "NBA active players raw data from Balldontlie API (NDJSON format)"
        external:
          location: "gs://smartbetting-landingzone/nba/active_players/2025/raw_nba_active_players_2025.json"
          options:
            format: NEWLINE_DELIMITED_JSON
        columns:
          - name: id
            description: "Unique player identifier"
            data_type: integer
          - name: first_name
            description: "Player first name"
            data_type: string
          - name: last_name
            description: "Player last name"
            data_type: string
          - name: position
            description: "Player position"
            data_type: string
          - name: height
            description: "Player height"
            data_type: string
          - name: weight
            description: "Player weight"
            data_type: string
          - name: jersey_number
            description: "Player jersey number"
            data_type: string
          - name: college
            description: "Player college"
            data_type: string
          - name: country
            description: "Player country"
            data_type: string
          - name: draft_year
            description: "Draft year"
            data_type: integer
          - name: draft_round
            description: "Draft round"
            data_type: integer
          - name: draft_number
            description: "Draft number"
            data_type: integer
          - name: team
            description: "Player team information (STRUCT with id, name, abbreviation, etc.)"
            data_type: struct

      - name: raw_team_season_averages_general_opponent
        description: "NBA team season averages general opponent stats from Balldontlie API. Stats that each team concedes to opponents (pts, reb, ast, fg%, 3p%) with pre-computed rankings."
        external:
          location: "gs://smartbetting-landingzone/nba/team_season_averages/2025/raw_nba_team_season_averages_2025-general-opponent-*.json"
          options:
            format: NEWLINE_DELIMITED_JSON
        columns:
          - name: team
            description: "Team information (STRUCT with id, name, abbreviation, conference, division, etc.)"
            data_type: struct
          - name: season
            description: "Season year (e.g., 2024)"
            data_type: integer
          - name: season_type
            description: "Season type (regular, playoffs, ist, playin)"
            data_type: string
          - name: type
            description: "Stats type (opponent)"
            data_type: string
          - name: category
            description: "Stats category (general)"
            data_type: string
          - name: stats
            description: "Opponent stats STRUCT (opp_pts, opp_reb, opp_ast, opp_fg_pct, opp_fg3_pct, opp_oreb, opp_dreb, opp_stl, opp_blk, opp_tov, opp_fta, opp_ft_pct + _rank variants for each)"
            data_type: struct

      - name: raw_team_season_averages_general_defense
        description: "NBA team season averages general defense stats from Balldontlie API. Defensive metrics including DefRtg, paint points conceded, 2nd chance points conceded."
        external:
          location: "gs://smartbetting-landingzone/nba/team_season_averages/2025/raw_nba_team_season_averages_2025-general-defense-*.json"
          options:
            format: NEWLINE_DELIMITED_JSON
        columns:
          - name: team
            description: "Team information (STRUCT with id, name, abbreviation, conference, division, etc.)"
            data_type: struct
          - name: season
            description: "Season year (e.g., 2024)"
            data_type: integer
          - name: season_type
            description: "Season type (regular, playoffs, ist, playin)"
            data_type: string
          - name: type
            description: "Stats type (overall)"
            data_type: string
          - name: category
            description: "Stats category (general)"
            data_type: string
          - name: stats
            description: "Defense stats STRUCT (def_rating, opp_pts_paint, opp_pts_2nd_chance, opp_pts_off_tov, opp_pts_fb, dreb_pct, stl, blk + _rank variants)"
            data_type: struct

