version: 2

models:
  - name: stg_futebol_leagues
    description: "Flatten do raw_futebol_leagues. 1 linha por (league_id, season_year)."
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - league_id
              - season_year
    columns:
      - name: league_id
        description: "ID da liga na API-Football"
        tests:
          - not_null
      - name: season_year
        description: "Ano da temporada"
        tests:
          - not_null
      - name: league_name
        description: "Nome oficial da liga (ex: 'Serie A', 'World Cup')"
      - name: league_type
        description: "Tipo: 'League' (campeonato regular) ou 'Cup' (mata-mata)"
      - name: country_name
        description: "Nome do país (ex: 'Brazil', 'World' para Copa do Mundo)"
      - name: country_code
        description: "Código ISO do país (ex: 'BR'). Pode ser nulo para competições internacionais."
      - name: season_start
        description: "Data ISO de início da temporada (YYYY-MM-DD)"
      - name: season_end
        description: "Data ISO de fim da temporada (YYYY-MM-DD)"
      - name: season_current
        description: "True se a API marca essa temporada como atual"
      - name: coverage
        description: >
          STRUCT com flags por feature: fixtures.{events,lineups,statistics_fixtures,statistics_players},
          standings, players, top_scorers, top_assists, top_cards, injuries, predictions, odds.
      - name: loaded_at
        description: "Timestamp ISO UTC do extractor"

  - name: stg_futebol_teams
    description: "Flatten do raw_futebol_teams. 1 linha por (team_id, requested_league_id, requested_season). Inclui venue para futuras dims."
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - team_id
              - requested_league_id
              - requested_season
    columns:
      - name: team_id
        description: "ID do time na API-Football"
        tests:
          - not_null
      - name: requested_league_id
        description: "ID da liga onde o time foi listado (parâmetro `league` da chamada)"
        tests:
          - not_null
      - name: requested_season
        description: "Ano da temporada requisitada"
        tests:
          - not_null
      - name: team_name
        description: "Nome do time (ex: 'Palmeiras', 'Brazil')"
      - name: team_code
        description: "Código curto do time (ex: 'PAL'). Pode ser nulo para seleções."
      - name: team_country
        description: "País do clube ou da seleção (ex: 'Brazil')"
      - name: team_founded_year
        description: "Ano de fundação do clube. NULL para seleções."
      - name: national
        description: "TRUE para seleções (Copa do Mundo), FALSE para clubes (Brasileirão)"
      - name: team_logo_url
        description: "URL do logo do time"
      - name: venue_id
        description: "ID do estádio principal do time"
      - name: venue_name
        description: "Nome do estádio"
      - name: venue_address
        description: "Endereço do estádio"
      - name: venue_city
        description: "Cidade do estádio"
      - name: venue_capacity
        description: "Capacidade do estádio (assentos)"
      - name: venue_surface
        description: "Tipo de gramado (ex: 'grass', 'artificial turf')"
      - name: venue_image_url
        description: "URL da imagem do estádio"
      - name: loaded_at
        description: "Timestamp ISO UTC do extractor"

  - name: stg_futebol_players
    description: "Flatten do raw_futebol_players. 1 linha por (player_id, requested_league_id, requested_season). dim_players faz dedup por player_id."
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - player_id
              - requested_league_id
              - requested_season
          config:
            severity: warn  # grain raw pré-dedup; dim_players deduppa por player_id (2 grupos dup hoje)
    columns:
      - name: player_id
        description: "ID do jogador na API-Football"
        tests:
          - not_null
      - name: requested_league_id
        description: "ID da liga onde o jogador foi listado (parâmetro `league` da chamada)"
        tests:
          - not_null
      - name: requested_season
        description: "Ano da temporada requisitada"
        tests:
          - not_null
      - name: player_name
        description: "Nome de exibição do jogador (ex: 'Raphael Veiga')"
      - name: first_name
        description: "Primeiro nome"
      - name: last_name
        description: "Sobrenome"
      - name: age
        description: "Idade na temporada requisitada (muda anualmente — dim_players mantém a mais recente)"
      - name: birth_date
        description: "Data de nascimento ISO (YYYY-MM-DD). Pode ser nula."
      - name: nationality
        description: "Nacionalidade do jogador"
      - name: height
        description: "Altura como string da API (ex: '175 cm'). Pode ser nula."
      - name: weight
        description: "Peso como string da API (ex: '68 kg'). Pode ser nulo."
      - name: injured
        description: "Flag de lesão no momento da coleta (snapshot — não confiável como histórico)"
      - name: photo_url
        description: "URL da foto do jogador"
      - name: position
        description: "Posição derivada de statistics[0].games.position (ex: 'Attacker', 'Midfielder'). Pode ser nula."
      - name: loaded_at
        description: "Timestamp ISO UTC do extractor"

  - name: stg_futebol_team_season_stats
    description: "Flatten do raw_futebol_team_season_stats. 1 linha por (team_id, requested_league_id, requested_season). Médias e percentuais castados de STRING. fact_team_season_stats deriva competition e dedup por (team_id, liga, season)."
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - team_id
              - requested_league_id
              - requested_season
    columns:
      - name: team_id
        description: "ID do time na API-Football"
        tests:
          - not_null
      - name: requested_league_id
        description: "ID da liga requisitada (base do competition)"
        tests:
          - not_null
      - name: requested_season
        description: "Ano da temporada requisitada"
        tests:
          - not_null
      - name: snapshot_date
        description: "Data (UTC) da coleta — chave de partição no fato"
      - name: form
        description: "Sequência de resultados da temporada (ex: 'WDLWW...')"
      - name: goals_for_avg_total
        description: "Média de gols marcados por jogo (FLOAT; a API manda STRING, cast aqui)"
      - name: goals_against_avg_total
        description: "Média de gols sofridos por jogo (FLOAT; cast de STRING)"
      - name: loaded_at
        description: "Timestamp ISO UTC do extractor"

  - name: stg_futebol_standings
    description: "Flatten do raw_futebol_standings. 1 linha por (team_id, group_name, requested_league_id, requested_season, snapshot_date) — group_name na chave porque na Copa o mesmo time aparece no grupo E no 'Ranking of third-placed teams'. Keywords SQL escapadas com crases (`group`, `all`, goals.`for`); renames de clareza (status→rank_status, description→rank_description, update→standings_updated_at). fact_standings_snapshot deriva competition e dedup."
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - team_id
              - group_name
              - requested_league_id
              - requested_season
              - snapshot_date
    columns:
      - name: team_id
        description: "ID do time na API-Football"
        tests:
          - not_null
      - name: requested_league_id
        description: "ID da liga requisitada (base do competition)"
        tests:
          - not_null
      - name: requested_season
        description: "Ano da temporada requisitada"
        tests:
          - not_null
      - name: snapshot_date
        description: "Data (UTC) da coleta do snapshot — chave de partição no fato"
        tests:
          - not_null
      - name: rank
        description: "Posição na tabela (1 = líder)"
        tests:
          - not_null
      - name: points
        description: "Pontos somados na temporada"
      - name: group_name
        description: "Grupo/divisão ('Serie A'; 'Group A'... na Copa)"
      - name: rank_status
        description: "Movimento vs rodada anterior: 'same' | 'up' | 'down'"
      - name: rank_description
        description: "Zona da classificação ('Promotion - Copa Libertadores', 'Relegation'...) ou null"
      - name: standings_updated_at
        description: "TIMESTAMP da última atualização da tabela na API"
      - name: loaded_at
        description: "Timestamp ISO UTC do extractor"

  - name: stg_futebol_injuries
    description: "Flatten do raw_futebol_injuries. 1 linha por registro da API (a API repete linhas EXATAS — sem teste de unicidade aqui; dedup acontece no fact_injuries_snapshot). player/team/fixture/league achatados; ⚠️ type/reason vêm aninhados em player (player.type→injury_type, player.reason→injury_reason)."
    columns:
      - name: player_id
        description: "ID do jogador lesionado/suspenso na API-Football"
        tests:
          - not_null
      - name: fixture_id
        description: "ID do jogo que o jogador vai desfalcar"
        tests:
          - not_null
      - name: requested_league_id
        description: "ID da liga requisitada (base do competition)"
        tests:
          - not_null
      - name: requested_season
        description: "Ano da temporada requisitada"
        tests:
          - not_null
      - name: snapshot_date
        description: "Data (UTC) da coleta do snapshot — chave de partição no fato"
        tests:
          - not_null
      - name: team_id
        description: "ID do time do jogador na API-Football"
        tests:
          - not_null
      - name: injury_type
        description: "'Missing Fixture' | 'Questionable'"
      - name: injury_reason
        description: "Motivo (texto livre); inclui suspensões"
      - name: loaded_at
        description: "Timestamp ISO UTC do extractor"

  - name: stg_futebol_predictions
    description: "Flatten do raw_futebol_predictions. 1 linha por fixture (1 previsão/jogo, sem UNNEST). predictions/comparison achatados; percentuais ('45%') e linhas de gol ('-1.5') STRING → FLOAT64 (REPLACE('%','') + SAFE_CAST). `def` escapado com crases. fact_predictions_api deriva competition/collection_date e dedup."
    columns:
      - name: fixture_id
        description: "ID do jogo na API-Football (FK p/ fact_fixtures)"
        tests:
          - not_null
      - name: league_id
        description: "ID da liga (base do competition)"
        tests:
          - not_null
      - name: season
        description: "Ano da temporada"
        tests:
          - not_null
      - name: collection_timestamp
        description: "TIMESTAMP (UTC) da coleta — chave de partição no fato (DATE)"
        tests:
          - not_null
      - name: kickoff_utc
        description: "Data/hora (UTC) do kickoff do jogo"
        tests:
          - not_null
      - name: prob_home_pct
        description: "Probabilidade % do mandante (cast de STRING '45%')"
      - name: prob_draw_pct
        description: "Probabilidade % de empate"
      - name: prob_away_pct
        description: "Probabilidade % do visitante"
      - name: loaded_at
        description: "Timestamp ISO UTC do extractor"

  - name: stg_futebol_fixtures
    description: "Flatten do raw_futebol_fixtures (espinha /fixtures). 1 linha por fixture (jogo). fact_fixtures deriva competition/date_utc (de timestamp_unix) e dedup por fixture_id. ⚠️ date_iso (ISO com offset) e league_season foram removidos por serem passthrough mortos (0 consumidores) — para data use timestamp_unix; para season use requested_season."
    columns:
      - name: fixture_id
        description: "ID do jogo na API-Football (PK; 1 linha por fixture)"
        tests:
          - not_null
          - unique
      - name: requested_league_id
        description: "ID da liga requisitada (parâmetro `league` da chamada /fixtures)"
        tests:
          - not_null
      - name: requested_season
        description: "Ano da temporada requisitada"
        tests:
          - not_null
      - name: referee
        description: "Árbitro do jogo. Pode ser nulo."
      - name: timezone
        description: "Timezone reportado pela API (sempre 'UTC' no payload)"
      - name: timestamp_unix
        description: "Epoch UTC do kickoff (INT64) — base canônica do date_utc no fato (preferir a uma string ISO com offset)"
      - name: venue_id
        description: "ID do estádio"
      - name: venue_name
        description: "Nome do estádio"
      - name: venue_city
        description: "Cidade do estádio"
      - name: status_long
        description: "Status longo (ex: 'Match Finished', 'Not Started')"
      - name: status_short
        description: "Status curto (ex: 'FT', 'NS', 'AET', 'PEN')"
      - name: status_elapsed
        description: "Minutos decorridos (NULL antes do jogo)"
      - name: round
        description: "Rodada/fase (ex: 'Regular Season - 12', 'Group A')"
      - name: home_team_id
        description: "ID do mandante"
      - name: home_team_name
        description: "Nome do mandante"
      - name: home_team_winner
        description: "TRUE se o mandante venceu; NULL antes do fim do jogo"
      - name: away_team_id
        description: "ID do visitante"
      - name: away_team_name
        description: "Nome do visitante"
      - name: away_team_winner
        description: "TRUE se o visitante venceu; NULL antes do fim do jogo"
      - name: goals_home
        description: "Gols do mandante no tempo normal; NULL antes do jogo"
      - name: goals_away
        description: "Gols do visitante no tempo normal; NULL antes do jogo"
      - name: score_halftime_home
        description: "Placar do mandante no intervalo"
      - name: score_halftime_away
        description: "Placar do visitante no intervalo"
      - name: score_fulltime_home
        description: "Placar do mandante no fim do tempo normal"
      - name: score_fulltime_away
        description: "Placar do visitante no fim do tempo normal"
      - name: score_extratime_home
        description: "Placar do mandante na prorrogação; NULL se não houve"
      - name: score_extratime_away
        description: "Placar do visitante na prorrogação; NULL se não houve"
      - name: score_penalty_home
        description: "Pênaltis convertidos pelo mandante; NULL se não houve"
      - name: score_penalty_away
        description: "Pênaltis convertidos pelo visitante; NULL se não houve"
      - name: loaded_at
        description: "Timestamp ISO UTC do extractor"

  - name: stg_futebol_fixture_events
    description: "Flatten do raw_futebol_fixture_events. 1 linha por evento de jogo; grain (fixture_id, event_order) — event_order é o índice cronológico no array da API (a API não traz id de evento). fact_fixture_events junta fact_fixtures p/ competition/season/date_utc e rótulo home/away."
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - fixture_id
              - event_order
    columns:
      - name: fixture_id
        description: "ID do jogo na API-Football (FK p/ fact_fixtures)"
        tests:
          - not_null
      - name: event_order
        description: "Índice do evento no array da API (0-based) — ordem cronológica; parte da chave"
        tests:
          - not_null
      - name: minute
        description: "Minuto do jogo em que o evento ocorreu (time.elapsed)"
      - name: minute_extra
        description: "Minutos de acréscimo (time.extra). NULL fora dos acréscimos"
      - name: team_id
        description: "ID do time do evento"
      - name: team_name
        description: "Nome do time do evento"
      - name: player_id
        description: "ID do jogador principal do evento (autor do gol/cartão / quem entra na subst)"
      - name: player_name
        description: "Nome do jogador principal"
      - name: assist_player_id
        description: "ID da assistência / quem sai na substituição. Frequentemente NULL"
      - name: assist_player_name
        description: "Nome da assistência / quem sai"
      - name: event_type
        description: "Tipo do evento: 'Goal' | 'Card' | 'subst' | 'Var'"
      - name: event_detail
        description: "Detalhe (ex: 'Normal Goal', 'Yellow Card', 'Substitution 1', 'Penalty')"
      - name: event_comments
        description: "Comentário livre da API. Frequentemente NULL"
      - name: loaded_at
        description: "Timestamp ISO UTC do extractor"

  - name: stg_futebol_fixture_lineups
    description: "Flatten do raw_futebol_fixture_lineups (nível time). 2 linhas por (fixture, fase) — formation/coach de cada time; grain (fixture_id, lineup_phase, team_id). lineup_phase distingue confirmed (~T-30min) de real (pós-jogo); fact_fixture_lineups faz dedup latest-wins por loaded_at (real vence confirmed)."
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - fixture_id
              - lineup_phase
              - team_id
    columns:
      - name: fixture_id
        description: "ID do jogo na API-Football (FK p/ fact_fixtures)"
        tests:
          - not_null
      - name: lineup_phase
        description: "'confirmed' (escalação ~T-30min) | 'real' (pós-jogo). Parte da chave de staging"
        tests:
          - not_null
      - name: team_id
        description: "ID do time do bloco"
        tests:
          - not_null
      - name: team_name
        description: "Nome do time do bloco"
      - name: formation
        description: "Formação tática (ex: '4-2-3-1')"
      - name: coach_id
        description: "ID do técnico"
      - name: coach_name
        description: "Nome do técnico"
      - name: loaded_at
        description: "Timestamp ISO UTC do extractor"

  - name: stg_futebol_fixture_lineups_players
    description: "Flatten/UNNEST do raw_futebol_fixture_lineups (nível jogador). ~22-30 linhas por (fixture, fase): startXI (is_starter=TRUE) + substitutes (is_starter=FALSE) dos dois times; grain (fixture_id, lineup_phase, player_id) — o teste de unicidade dispara se um jogador aparecer em startXI E substitutes na mesma fase. fact_fixture_lineups_players faz dedup latest-wins por loaded_at."
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - fixture_id
              - lineup_phase
              - player_id
          config:
            severity: warn  # grain raw pré-dedup; fact_fixture_lineups_players deduppa latest-wins (1 grupo dup hoje)
    columns:
      - name: fixture_id
        description: "ID do jogo na API-Football (FK p/ fact_fixtures)"
        tests:
          - not_null
      - name: lineup_phase
        description: "'confirmed' | 'real'. Parte da chave de staging"
        tests:
          - not_null
      - name: player_id
        description: "ID do jogador na escalação"
        tests:
          - not_null:
              config:
                severity: warn  # 4 NULLs hoje (slot de escalação sem player_id na API); fact filtra/deduppa
      - name: team_id
        description: "ID do time do jogador"
      - name: team_name
        description: "Nome do time do jogador"
      - name: is_starter
        description: "TRUE se titular (startXI); FALSE se banco (substitutes)"
      - name: player_slot
        description: "Índice do jogador no array da API (WITH OFFSET) — preserva a ordem dentro de startXI/substitutes"
      - name: player_name
        description: "Nome do jogador"
      - name: shirt_number
        description: "Número da camisa"
      - name: position
        description: "Posição na escalação (ex: 'G', 'D', 'M', 'F')"
      - name: grid
        description: "Coordenada tática 'linha:coluna' (ex: '1:1'). Quase sempre NULL no banco"
      - name: loaded_at
        description: "Timestamp ISO UTC do extractor"

  - name: stg_futebol_fixture_statistics
    description: "Flatten + pivot do raw_futebol_fixture_statistics. 2 linhas por fixture (mandante/visitante); grain (fixture_id, team_id). Pivota o array statistics[{type,value}] em colunas tipadas (SAFE_CAST; ANY_VALUE() tolera 'type' duplicado no array). Backbone do fact_fixture_stats (Poisson/value); junta fact_fixtures p/ competition/season/date_utc e rótulo home/away."
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - fixture_id
              - team_id
    columns:
      - name: fixture_id
        description: "ID do jogo na API-Football (FK p/ fact_fixtures)"
        tests:
          - not_null
      - name: team_id
        description: "ID do time do bloco de estatística"
        tests:
          - not_null
      - name: team_name
        description: "Nome do time do bloco"
      - name: shots_on_goal
        description: "Chutes no gol"
      - name: shots_off_goal
        description: "Chutes para fora"
      - name: total_shots
        description: "Total de finalizações"
      - name: blocked_shots
        description: "Finalizações bloqueadas"
      - name: shots_insidebox
        description: "Finalizações dentro da área"
      - name: shots_outsidebox
        description: "Finalizações de fora da área"
      - name: fouls
        description: "Faltas cometidas"
      - name: corner_kicks
        description: "Escanteios"
      - name: offsides
        description: "Impedimentos"
      - name: ball_possession
        description: "Posse de bola % (o '%' é removido antes do cast)"
      - name: yellow_cards
        description: "Cartões amarelos"
      - name: red_cards
        description: "Cartões vermelhos"
      - name: goalkeeper_saves
        description: "Defesas do goleiro"
      - name: total_passes
        description: "Total de passes"
      - name: passes_accurate
        description: "Passes certos"
      - name: passes_pct
        description: "Precisão de passe % (o '%' é removido antes do cast)"
      - name: expected_goals
        description: "xG fornecido pela própria API-Football v3 (FLOAT)"
      - name: goals_prevented
        description: "Gols evitados (métrica de goleiro da API v3, FLOAT)"
      - name: loaded_at
        description: "Timestamp ISO UTC do extractor"

  - name: stg_futebol_fixture_player_stats
    description: "Flatten do raw_futebol_fixture_player_stats (statistics[0], STRUCT único, sem UNNEST). 1 linha por (fixture_id, player_id). rating/passes_accuracy via SAFE_CAST (a API manda string); penalty_committed corrige a grafia errada da API (penalty.commited, 1 't'). Backbone de player props; fact_fixture_player_stats faz latest-wins por (fixture_id, player_id)."
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - fixture_id
              - player_id
          config:
            severity: warn  # grain raw pré-dedup; fact_fixture_player_stats deduppa latest-wins (7 grupos dup hoje)
    columns:
      - name: fixture_id
        description: "ID do jogo na API-Football (FK p/ fact_fixtures)"
        tests:
          - not_null
      - name: player_id
        description: "ID do jogador"
        tests:
          - not_null
      - name: team_id
        description: "ID do time do jogador"
      - name: team_name
        description: "Nome do time do jogador"
      - name: player_name
        description: "Nome do jogador"
      - name: player_photo
        description: "URL da foto do jogador"
      - name: minutes
        description: "Minutos jogados"
      - name: shirt_number
        description: "Número da camisa"
      - name: position
        description: "Posição (ex: 'G', 'D', 'M', 'F')"
      - name: rating
        description: "Nota da partida (FLOAT; SAFE_CAST de string '6.3')"
      - name: is_captain
        description: "TRUE se capitão"
      - name: is_substitute
        description: "TRUE se entrou do banco"
      - name: offsides
        description: "Impedimentos do jogador"
      - name: shots_total
        description: "Total de finalizações"
      - name: shots_on
        description: "Finalizações no gol"
      - name: goals_total
        description: "Gols marcados"
      - name: goals_conceded
        description: "Gols sofridos (goleiro)"
      - name: assists
        description: "Assistências"
      - name: saves
        description: "Defesas (goleiro)"
      - name: passes_total
        description: "Total de passes"
      - name: passes_key
        description: "Passes decisivos"
      - name: passes_accuracy
        description: "Precisão de passe (INT; SAFE_CAST de string)"
