version: 2

models:
  - name: fact_value_opportunities
    description: >
      Mart de saída do Motor de Score de Confiabilidade (value bet futebol). 1 linha por
      (fixture_id, market, outcome, line_value) que passa no gate (edge>0 E n_casas>=3 E de-vig
      válido E conjunto da Pinnacle completo pro mercado). Score 0-100 = clamp(PTS_VALOR +
      PTS_PREMISSAS + PTS_CORROBORACAO − PENALIDADES); faixa Alta(>=60)/Média(40-59). Long por
      `market` — v4: 1X2 (match_winner) + Gols O/U (goals_over_under) + Handicap asiático
      (asian_handicap) + Ambos Marcam/BTTS (btts, via de-vig de consenso). valor_fonte distingue.
    columns:
      - name: fixture_id
        tests: [not_null]
      - name: market
        tests:
          - not_null
          - accepted_values:
              values: ['match_winner', 'goals_over_under', 'asian_handicap', 'btts']
      - name: outcome
        tests:
          - not_null
          - accepted_values:
              values: ['Home', 'Draw', 'Away', 'Over', 'Under', 'Yes', 'No']
      - name: line_value
        description: "NULL no 1X2 e no BTTS; a linha L (1.5/2.5/3.5/...) no Gols O/U; o handicap (ótica do mandante, mesmo p/ Home e Away) no Handicap asiático."
      - name: valor_fonte
        description: "Fonte do de-vig/edge: 'pinnacle' (mercados 1/4/5) ou 'consenso' (mediana das casas — BTTS, pois a Pinnacle não precifica; rotular como estimativa no front)."
        tests:
          - accepted_values:
              values: ['pinnacle', 'consenso']
      - name: score
        tests:
          - not_null
          - dbt_utils.accepted_range:
              min_value: 0
              max_value: 100
      - name: faixa
        tests:
          - accepted_values:
              values: ['Alta', 'Média', 'Baixa']
      - name: edge
        description: "Gate garante > 0 nas linhas materializadas."
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - fixture_id
            - market
            - outcome
            - line_value
