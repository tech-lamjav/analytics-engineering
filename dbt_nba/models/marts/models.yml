  - name: dim_player_passing_stats
    description: "NBA player tracking/passing season averages mart. One row per active player for the current season with potential assists, pass volume, and assist efficiency metrics from Balldontlie /v1/season_averages/tracking?type=passing. Used as player profile context for assists props analysis (season-level only — game-by-game passing fields live in ft_game_player_passing_stats)."
    columns:
      - name: player_id
        description: "Unique identifier for the player"
        tests:
          - not_null
          - unique
      - name: player_name
        description: "Full name of the player"
      - name: position
        description: "Player's position (e.g., G, F, C)"
      - name: team_id
        description: "Unique identifier for the player's current team"
      - name: season
        description: "Season year (e.g., 2025)"
      - name: games_played
        description: "Number of games played in the season"
      - name: minutes
        description: "Average minutes per game"
      - name: ast
        description: "Average assists per game"
      - name: potential_ast
        description: "Average potential assists per game (passes that would become assists if the shot was made)"
      - name: potential_ast_rank
        description: "League-wide rank by potential_ast (1 = league leader)"
      - name: passes_made
        description: "Average passes made per game"
      - name: passes_received
        description: "Average passes received per game"
      - name: secondary_ast
        description: "Average secondary (hockey) assists per game"
      - name: ft_ast
        description: "Average free throw assists per game"
      - name: ast_points_created
        description: "Average points created per game from assists"
      - name: ast_adj
        description: "Adjusted assists per game"
      - name: ast_to_pass_pct
        description: "Percentage of passes that became assists"
      - name: ast_to_pass_pct_adj
        description: "Adjusted assist-to-pass percentage"
      - name: potential_ast_per_pass
        description: "Calculated: potential_ast / passes_made"
      - name: ast_conversion_rate
        description: "Calculated: ast / potential_ast (rate at which potential assists convert to actual assists)"
      - name: loaded_at
        description: "Row load timestamp"

  - name: ft_game_player_passing_stats
    description: "NBA fact table for player passing/playmaking stats per game from Balldontlie /nba/v2/stats/advanced. Game-by-game series for trend analysis on assists props. Filtered to full-game rows (period = 0). Note: potential_ast is NOT available game-by-game from this API; use dim_player_passing_stats for that metric (season-level only)."
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - player_id
              - game_id
    columns:
      - name: player_id
        description: "Unique identifier for the player"
      - name: team_id
        description: "Unique identifier for the player's team in this game"
      - name: game_id
        description: "Unique identifier for the game"
      - name: game_date
        description: "Date when the game was played"
      - name: season
        description: "Season year (e.g., 2025)"
      - name: passes
        description: "Total passes thrown by the player in this game"
      - name: secondary_assists
        description: "Hockey assists (passes that lead to an assist)"
      - name: free_throw_assists
        description: "Passes that lead to free throws made"
      - name: screen_assists
        description: "Screens that lead to a made field goal"
      - name: screen_assist_points
        description: "Points scored from screen assists"
      - name: assist_percentage
        description: "Percentage of teammate field goals the player assisted while on court"
      - name: assist_ratio
        description: "Assists per 100 possessions"
      - name: assist_to_turnover
        description: "Assist-to-turnover ratio for this game"
      - name: turnover_ratio
        description: "Turnovers per 100 possessions"
      - name: usage_percentage
        description: "Percentage of team plays used by the player while on court"
      - name: touches
        description: "Total ball touches in the game"
      - name: possessions
        description: "Possessions used in the game"
      - name: extra_assists_per_pass
        description: "Calculated: (secondary_assists + free_throw_assists) / passes — measures uncredited playmaking per pass"
      - name: is_b2b_game
        description: "Boolean flag — true if this was a back-to-back game for the player's team"
      - name: played_against
        description: "Opponent team abbreviation. Prefixed with '@' if playing away (e.g., '@LAL', 'BOS')"
      - name: home_away
        description: "Game location from player's perspective: 'Casa' (home) or 'Fora' (away)"
      - name: loaded_at
        description: "Row load timestamp"