  - name: fact_team_season_stats
    description: >
      Agregados de temporada por time (/teams/statistics). 1 linha por (team_id, liga,
      season) — input direto pro modelo Poisson (força ataque/defesa, médias casa/fora).
      Self-contained: competition/season vêm da própria resposta da API (sem join em
      fact_fixtures). Latest-only: particionada por snapshot_date (data da coleta) e
      clusterizada por (team_id, season); reconstruída full a cada run semanal. Dedup por
      (team_id, liga, season). Cobre Brasileirão (71) 2024/25/26 e Copa do Mundo (1) 2026.
      O teste singular garante que o flatten não veio todo NULL.
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - team_id
              - competition_id
              - season
    columns:
      - name: team_id
        description: "ID do time na API-Football (FK p/ dim_teams; cluster key)"
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_teams')
                field: team_id
      - name: team_name
        description: "Nome do time"
      - name: competition
        description: "'brasileirao' | 'copa_mundo' (derivado de requested_league_id)"
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['brasileirao', 'copa_mundo']
      - name: competition_id
