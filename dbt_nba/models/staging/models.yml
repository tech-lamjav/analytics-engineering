version: 2

models:
  - name: stg_active_players
    description: "Staging table for NBA active players. Contains current roster information including player names, positions, and team assignments."
    columns:
      - name: player_id
        description: "Unique identifier for each NBA player"
        tests:
          - not_null
          - unique
      - name: team_id
        description: "Unique identifier for the player's current team"
      - name: team_name
        description: "Full name of the player's current team"
      - name: team_abbreviation
        description: "Three-letter abbreviation of the player's team"
      - name: player_name
        description: "Full name of the player (First Last format)"
      - name: last_name_first_team
        description: "Player name in Last, First (TEAM) format for display purposes"
      - name: position
        description: "Player's position (e.g., G, F, C, G-F, F-C)"

  - name: stg_game_player_stats
    description: "Staging table for individual player statistics from each NBA game. Contains detailed performance metrics for every player in every game they participated in. Filtered to players who actually played (minutes > 0); for did-not-play detection use stg_game_player_stats_all."
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - player_id
              - game_id
    columns:
      - name: player_id
        description: "Unique identifier for the player"
        tests:
          - not_null
      - name: team_id
        description: "Unique identifier for the player's team in this game"
        tests:
          - not_null
      - name: game_id
        description: "Unique identifier for the game"
        tests:
          - not_null
      - name: game_date
        description: "Date when the game was played (typed to DATE via SAFE_CAST)"
      - name: home_team_score
        description: "Final score of the home team"
      - name: home_team_id
        description: "Unique identifier for the home team"
      - name: visitor_team_score
        description: "Final score of the visiting team"
      - name: visitor_team_id
        description: "Unique identifier for the visiting team"
      - name: points
        description: "Points scored by the player (converted to INTEGER)"
      - name: minutes
        description: "Minutes played by the player (converted to INTEGER)"
      - name: threes
        description: "Three-point field goals made by the player (converted to INTEGER)"
      - name: rebounds
        description: "Total rebounds (offensive + defensive) by the player (converted to INTEGER)"
      - name: points_rebounds
        description: "Combined points and rebounds (calculated: points + rebounds)"
      - name: assists
        description: "Assists by the player (converted to INTEGER)"
      - name: points_assists
        description: "Combined points and assists (calculated: points + assists)"
      - name: rebounds_assists
        description: "Combined rebounds and assists (calculated: rebounds + assists)"
      - name: offensive_rebounds
        description: "Offensive rebounds by the player (converted to INTEGER)"
      - name: defensive_rebounds
        description: "Defensive rebounds by the player (converted to INTEGER)"
      - name: points_rebounds_assists
        description: "Combined points, rebounds, and assists (calculated: points + rebounds + assists)"
      - name: steals
        description: "Steals by the player (converted to INTEGER)"
      - name: blocks
        description: "Blocks by the player (converted to INTEGER)"
      - name: blocks_steals
        description: "Combined blocks and steals (calculated: blocks + steals)"
      - name: turnovers
        description: "Turnovers by the player (converted to INTEGER)"
      - name: field_goal_percentage
        description: "Field goal percentage for the player in this game (converted to FLOAT64)"
      - name: free_throw_percentage
        description: "Free throw percentage for the player in this game (converted to FLOAT64)"
      - name: triple_double
        description: "Binary indicator (1/0) if player achieved a triple-double (10+ in 3 of: points, rebounds, assists, steals, blocks)"
      - name: double_double
        description: "Binary indicator (1/0) if player achieved a double-double (10+ in 2 of: points, rebounds, assists, steals, blocks)"
      - name: winner_team_id
        description: "Team ID of the winning team (calculated from scores)"
      - name: game_number
        description: "Sequential game number for the player (1 = most recent game, calculated using ROW_NUMBER)"

  - name: stg_games
    description: "Staging table for NBA games with B2B flag from NDJSON external table. Contains game-level information including teams, scores, datetimes, and winner. Data is extracted from NDJSON format with nested games array structure."
    columns:
      - name: game_id
        description: "Unique identifier for the game"
        tests:
          - not_null
          - unique
      - name: season
        description: "Season year (e.g., 2025, converted to INT64)"
      - name: game_date
        description: "Date when the game was/will be played (parsed from string to DATE)"
      - name: game_datetime_utc
        description: "Game datetime in UTC timezone (ISO 8601 format string)"
      - name: game_datetime_brasilia
        description: "Game datetime converted to Brasília timezone (UTC-3), converted from UTC datetime"
      - name: home_team_id
        description: "Unique identifier for the home team (converted to INT64)"
      - name: home_team_name
        description: "Full name of the home team (city + name)"
      - name: home_team_abbreviation
        description: "Three-letter abbreviation for the home team"
      - name: home_team_score
        description: "Final score of the home team (null for future games, converted to INT64)"
      - name: visitor_team_id
        description: "Unique identifier for the visiting team (converted to INT64)"
      - name: visitor_team_name
        description: "Full name of the visitor team (city + name)"
      - name: visitor_team_abbreviation
        description: "Three-letter abbreviation for the visiting team"
      - name: visitor_team_score
        description: "Final score of the visiting team (null for future games, converted to INT64)"
      - name: winner_team_id
        description: "Team ID of the winning team (null for future games or ties, calculated from scores)"

  - name: stg_season_averages_general_base
    description: "Staging table for NBA player season averages (base statistics). Contains per-game averages for fundamental basketball statistics. Filtered to season_type = 'regular' (one row per player)."
    columns:
      - name: player_id
        description: "Unique identifier for the player"
        tests:
          - not_null
          - unique
      - name: points
        description: "Average points per game (converted to FLOAT64)"
      - name: rebounds
        description: "Average rebounds per game (converted to FLOAT64)"
      - name: points_rebounds
        description: "Average combined points and rebounds per game (calculated: points + rebounds)"
      - name: assists
        description: "Average assists per game (converted to FLOAT64)"
      - name: points_assists
        description: "Average combined points and assists per game (calculated: points + assists)"
      - name: rebounds_assists
        description: "Average combined rebounds and assists per game (calculated: rebounds + assists)"
      - name: points_rebounds_assists
        description: "Average combined points, rebounds, and assists per game (calculated: points + rebounds + assists)"
      - name: steals
        description: "Average steals per game (converted to FLOAT64)"
      - name: blocks
        description: "Average blocks per game (converted to FLOAT64)"
      - name: blocks_steals
        description: "Average combined blocks and steals per game (calculated: blocks + steals)"
      - name: turnovers
        description: "Average turnovers per game (converted to FLOAT64)"
      - name: three_pointers_made
        description: "Average three-pointers made per game (converted to FLOAT64)"
      - name: double_doubles
        description: "Total number of double-doubles in the season (converted to INTEGER)"
      - name: triple_doubles
        description: "Total number of triple-doubles in the season (converted to INTEGER)"
      - name: age
        description: "Player's age (converted to INTEGER)"

  - name: stg_team_season_averages_general_advanced
    description: "Staging table for NBA team season averages (general/advanced). Team-level offensive rating, defensive rating, net rating, possessions, and pace per 100 possessions from Balldontlie API. Used by dim_teams for official team ratings. Filtered to season_type = 'regular' (one row per team/season)."
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - team_id
              - season
    columns:
      - name: team_id
        description: "Unique identifier for the team"
        tests:
          - not_null
      - name: season
        description: "Season year (e.g., 2024)"
        tests:
          - not_null
      - name: season_type
        description: "Season type (regular, playoffs, ist, playin)"
      - name: team_offensive_rating
        description: "Team points scored per 100 possessions (official metric from API)"
      - name: team_defensive_rating
        description: "Team points allowed per 100 possessions (official metric from API)"
      - name: team_net_rating
        description: "Point differential per 100 possessions (offensive - defensive)"
      - name: team_possessions
        description: "Estimated possessions per game (if available from API)"
      - name: team_pace
        description: "Possessions per 48 minutes (if available from API)"

  - name: stg_season_averages_general_advanced
    description: "Staging table for NBA player season averages (advanced statistics). Contains player-level offensive and defensive ratings. Kept for compatibility; dim_teams now uses team-level ratings from stg_team_season_averages_general_advanced. Filtered to season_type = 'regular' (one row per player)."
    columns:
      - name: player_id
        description: "Unique identifier for the player"
        tests:
          - not_null
          - unique
      - name: offensive_rating
        description: "Points produced per 100 possessions (efficiency metric, converted to FLOAT64)"
      - name: defensive_rating
        description: "Points allowed per 100 possessions (efficiency metric, converted to FLOAT64)"

  - name: stg_season_averages_shooting_by_zone
    description: "Staging table for NBA player season averages (shooting by zone). Contains field goal statistics broken down by court zones including corner 3s, above-the-break 3s, restricted area, paint, mid-range, and backcourt. Filtered to season_type = 'regular' (one row per player)."
    columns:
      - name: player_id
        description: "Unique identifier for the player"
        tests:
          - not_null
          - unique
      - name: player_name
        description: "Full name of the player (First Last format, trimmed)"
      - name: corner_3_fga
        description: "Average corner 3-point field goals attempted per game"
      - name: corner_3_fgm
        description: "Average corner 3-point field goals made per game"
      - name: corner_3_fg_pct
        description: "Corner 3-point field goal percentage"
      - name: left_corner_3_fga
        description: "Average left corner 3-point field goals attempted per game"
      - name: left_corner_3_fgm
        description: "Average left corner 3-point field goals made per game"
      - name: left_corner_3_fg_pct
        description: "Left corner 3-point field goal percentage"
      - name: right_corner_3_fga
        description: "Average right corner 3-point field goals attempted per game"
      - name: right_corner_3_fgm
        description: "Average right corner 3-point field goals made per game"
      - name: right_corner_3_fg_pct
        description: "Right corner 3-point field goal percentage"
      - name: above_the_break_3_fga
        description: "Average above-the-break 3-point field goals attempted per game"
      - name: above_the_break_3_fgm
        description: "Average above-the-break 3-point field goals made per game"
      - name: above_the_break_3_fg_pct
        description: "Above-the-break 3-point field goal percentage"
      - name: restricted_area_fga
        description: "Average restricted area field goals attempted per game"
      - name: restricted_area_fgm
        description: "Average restricted area field goals made per game"
      - name: restricted_area_fg_pct
        description: "Restricted area field goal percentage"
      - name: in_the_paint_non_ra_fga
        description: "Average in-the-paint (non-restricted area) field goals attempted per game"
      - name: in_the_paint_non_ra_fgm
        description: "Average in-the-paint (non-restricted area) field goals made per game"
      - name: in_the_paint_non_ra_fg_pct
        description: "In-the-paint (non-restricted area) field goal percentage"
      - name: mid_range_fga
        description: "Average mid-range field goals attempted per game"
      - name: mid_range_fgm
        description: "Average mid-range field goals made per game"
      - name: mid_range_fg_pct
        description: "Mid-range field goal percentage"
      - name: backcourt_fga
        description: "Average backcourt field goals attempted per game"
      - name: backcourt_fgm
        description: "Average backcourt field goals made per game"
      - name: backcourt_fg_pct
        description: "Backcourt field goal percentage"

  - name: stg_team_standings
    description: "Staging table for NBA team standings. Contains current season standings, records, and conference information."
    columns:
      - name: team_id
        description: "Unique identifier for the team"
        tests:
          - not_null
          - unique
      - name: team_name
        description: "Full name of the team"
      - name: team_abbreviation
        description: "Three-letter abbreviation for the team"
      - name: conference
        description: "Conference the team belongs to (Eastern or Western)"
      - name: team_city
        description: "City where the team is located"
      - name: season
        description: "Season year"
      - name: conference_rank
        description: "Team's rank within their conference"
      - name: wins
        description: "Number of wins in the season"
      - name: losses
        description: "Number of losses in the season"
      - name: is_dst
        description: "Boolean flag indicating if current date is in US Daylight Saving Time period (second Sunday of March to first Sunday of November)"
      - name: injury_report_time_offset_hours
        description: "Hours to add to 13:30 local time to convert to Brasília time for injury report release. Accounts for US DST rules (except Arizona which doesn't observe DST)"
      - name: team_injury_report_time_brasilia
        description: "Time when injury report is released for the team's home games in Brasília timezone (13:30 local time converted). Example: Los Angeles = 17:30 (13:30 PT + 4 hours during DST)"

  - name: stg_player_injuries
    description: "Staging table for NBA player injuries. Contains injury information including expected return dates, status, and descriptions. Rows with status = 'Probable' are excluded; NULL-status rows are retained."
    columns:
      - name: player_id
        description: "Unique identifier for the injured player"
        tests:
          - not_null
          - unique
      - name: team_id
        description: "Unique identifier for the player's team"
      - name: season
        description: "Season year"
      - name: return_date
        description: "Expected return date for the player (parsed from YYYY-MM-DD format)"
      - name: description
        description: "Detailed description of the injury and player status"
      - name: status
        description: "Injury status (e.g., Doubtful, Out, Questionable)"

  - name: stg_game_player_advanced_stats
    description: "Staging table for NBA player advanced/tracking stats per game from Balldontlie /nba/v2/stats/advanced. Flattens the stats array into one row per player per game per period (period 0 = full game, 1-4 = quarters) with passing, playmaking, hustle, and rating fields."
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - player_id
              - game_id
              - period
    columns:
      - name: player_id
        description: "Unique identifier for the player"
        tests:
          - not_null
      - name: team_id
        description: "Unique identifier for the player's team in this game"
        tests:
          - not_null
      - name: game_id
        description: "Unique identifier for the game"
        tests:
          - not_null
      - name: game_date
        description: "Date when the game was played (typed to DATE via SAFE_CAST)"
      - name: season
        description: "Season year (e.g., 2025, converted to INT64)"
      - name: season_type
        description: "Season type derived from game date (regular, playin, playoffs)"
      - name: period
        description: "Period number (0 = full game, 1-4 = quarters)"
        tests:
          - not_null
      - name: passes
        description: "Total passes thrown by the player in this game"
      - name: secondary_assists
        description: "Hockey assists (passes that lead to an assist)"
      - name: free_throw_assists
        description: "Passes that lead to free throws made"
      - name: screen_assists
        description: "Screens that lead to a made field goal"
      - name: screen_assist_points
        description: "Points scored from screen assists"
      - name: assist_percentage
        description: "Percentage of teammate field goals the player assisted while on court"
      - name: assist_ratio
        description: "Assists per 100 possessions"
      - name: assist_to_turnover
        description: "Assist-to-turnover ratio for the player in this game"
      - name: turnover_ratio
        description: "Turnovers per 100 possessions"
      - name: usage_percentage
        description: "Percentage of team plays used by the player while on court"
      - name: touches
        description: "Total ball touches in the game"
      - name: possessions
        description: "Possessions used by the player in this game"
      - name: partial_possessions
        description: "Partial possessions count (FLOAT64)"
      - name: speed
        description: "Average movement speed (mph) while on court"
      - name: distance
        description: "Total distance traveled (miles) while on court"
      - name: pie
        description: "Player Impact Estimate (FLOAT64)"
      - name: offensive_rating
        description: "Points scored per 100 possessions while the player is on court"
      - name: defensive_rating
        description: "Points allowed per 100 possessions while the player is on court"
      - name: net_rating
        description: "Offensive minus defensive rating"
      - name: true_shooting_percentage
        description: "Shooting efficiency that accounts for 2pt, 3pt, and free throws"
      - name: effective_field_goal_percentage
        description: "Field goal percentage adjusted for the extra value of 3-pointers"
      - name: deflections
        description: "Number of deflections by the player"
      - name: contested_shots
        description: "Number of contested shots by the player"
      - name: box_outs
        description: "Number of box outs"
      - name: charges_drawn
        description: "Number of offensive fouls drawn"
      - name: points_paint
        description: "Points scored in the paint"
      - name: points_fast_break
        description: "Points scored on fast breaks"
      - name: points_second_chance
        description: "Points scored on second-chance opportunities"
      - name: points_off_turnovers
        description: "Points scored from opponent turnovers"

  - name: stg_season_averages_tracking_passing
    description: "Staging table for NBA player season averages from Balldontlie /v1/season_averages/tracking?type=passing. Includes potential_ast, passes_made, secondary_ast, ft_ast, ast_points_created, and assist efficiency metrics aggregated per player per regular season."
    columns:
      - name: player_id
        description: "Unique identifier for the player"
        tests:
          - not_null
          - unique
      - name: season
        description: "Season year (e.g., 2025, converted to INT64)"
      - name: season_type
        description: "Season type, filtered to 'regular' in this staging"
      - name: games_played
        description: "Number of games played in the season (converted to INT64)"
      - name: minutes
        description: "Average minutes per game (FLOAT64)"
      - name: ast
        description: "Average assists per game (FLOAT64)"
      - name: potential_ast
        description: "Average potential assists per game (passes that would become assists if the shot was made)"
      - name: passes_made
        description: "Average passes made per game"
      - name: passes_received
        description: "Average passes received per game"
      - name: secondary_ast
        description: "Average secondary assists (hockey assists) per game"
      - name: ft_ast
        description: "Average free throw assists per game"
      - name: ast_points_created
        description: "Average points created per game from assists (assists × points per assisted FG)"
      - name: ast_adj
        description: "Adjusted assists per game"
      - name: ast_to_pass_pct
        description: "Percentage of passes that became assists"
      - name: ast_to_pass_pct_adj
        description: "Adjusted assist-to-pass percentage"

  - name: stg_player_props
    description: "Staging table for NBA player props from DraftKings NDJSON external table. Contains betting lines for various player performance metrics. Prop types are normalized to stat_type with 'player_' prefix for consistency with player stats models. Filtered to over_under props only. Deduped to one row per (player_id, game_id, stat_type) via deterministic main-line selection (vendor priority -> line closest to per-vendor median -> lowest line)."
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - player_id
              - game_id
              - stat_type
    columns:
      - name: prop_id
        description: "Unique identifier for the prop"
      - name: player_id
        description: "Unique identifier for the player"
        tests:
          - not_null
      - name: game_id
        description: "Unique identifier for the game"
        tests:
          - not_null
      - name: season
        description: "Season year (e.g., 2025)"
      - name: vendor
        description: "Sportsbook vendor (e.g., draftkings)"
      - name: stat_type
        description: "Normalized prop type with 'player_' prefix to match stat_type format used in player stats models (e.g., player_points, player_rebounds, player_assists, player_points_rebounds, player_assists_1q, player_points_first3min). Used for joining with player stats."
      - name: line_value
        description: "Betting line value for the prop (converted to FLOAT64)"

  - name: stg_game_player_stats_all
    description: "Staging variant of stg_game_player_stats WITHOUT the minutes > 0 filter. Retains did-not-play (DNP) rows so int_game_player_stats_not_played can detect absences. Exposes a did_play flag. Use stg_game_player_stats for played-only aggregations."
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - player_id
              - game_id
    columns:
      - name: player_id
        description: "Unique identifier for the player"
        tests:
          - not_null
      - name: team_id
        description: "Unique identifier for the player's team in this game"
        tests:
          - not_null
      - name: game_id
        description: "Unique identifier for the game"
        tests:
          - not_null
      - name: game_date
        description: "Date when the game was played (typed to DATE via SAFE_CAST)"
      - name: season
        description: "Season year (filtered via the nba_season var, default 2025)"
      - name: minutes
        description: "Minutes played (nullable INTEGER via SAFE_CAST; NULL or 0 for DNP rows)"
      - name: did_play
        description: "Boolean: TRUE when the player actually played (minutes IS NOT NULL AND minutes > 0); FALSE for DNP rows"

  - name: stg_game_player_stats_period
    description: "Staging for NBA game player stats by period (quarter). Source filtered to periods 1 and 2 (first half). One row per player/game/period."
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - player_id
              - game_id
              - period
    columns:
      - name: period
        description: "Game period (1 = Q1, 2 = Q2); source filtered to the first half"
        tests:
          - not_null
      - name: player_id
        description: "Unique identifier for the player"
        tests:
          - not_null
      - name: team_id
        description: "Unique identifier for the player's team in this game"
        tests:
          - not_null
      - name: game_id
        description: "Unique identifier for the game"
        tests:
          - not_null
      - name: game_date
        description: "Date when the game was played (typed to DATE via SAFE_CAST)"
      - name: points
        description: "Points scored by the player in the period (SAFE_CAST to INTEGER)"
      - name: minutes
        description: "Minutes played by the player in the period (SAFE_CAST to INTEGER)"
      - name: rebounds
        description: "Rebounds by the player in the period (SAFE_CAST to INTEGER)"
      - name: assists
        description: "Assists by the player in the period (SAFE_CAST to INTEGER)"

  - name: stg_betting_odds
    description: "Game-level spread, moneyline, and total O/U from raw_betting_odds. One row per game, preferred vendor (draftkings > fanduel > others), tiebroken by most recent updated_at then id."
    columns:
      - name: game_id
        description: "Unique identifier for the game (converted to INT64)"
        tests:
          - not_null
          - unique
      - name: season
        description: "Season year (converted to INT64)"
      - name: vendor
        description: "Sportsbook vendor selected for this game"
      - name: spread
        description: "Home spread line value (FLOAT64)"
      - name: spread_away
        description: "Away spread line value (FLOAT64)"
      - name: total
        description: "Game total (over/under) line value (FLOAT64)"
      - name: spread_home_odds
        description: "American odds for the home spread (INT64)"
      - name: spread_away_odds
        description: "American odds for the away spread (INT64)"
      - name: total_over_odds
        description: "American odds for the over (INT64)"
      - name: total_under_odds
        description: "American odds for the under (INT64)"
      - name: moneyline_home_odds
        description: "American moneyline odds for the home team (INT64)"
      - name: moneyline_away_odds
        description: "American moneyline odds for the away team (INT64)"
      - name: updated_at
        description: "Timestamp of the odds snapshot (TIMESTAMP)"

  - name: stg_team_season_averages_general_defense
    description: "Staging table for NBA team season averages (general/defense). Defensive metrics including DefRtg, paint points conceded, 2nd chance points conceded, from Balldontlie API. Filtered to season_type = 'regular'. One row per team/season."
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - team_id
              - season
    columns:
      - name: team_id
        description: "Unique identifier for the team"
        tests:
          - not_null
      - name: season
        description: "Season year (converted to INT64)"
        tests:
          - not_null

  - name: stg_team_season_averages_general_opponent
    description: "Staging table for NBA team season averages (general/opponent). Stats that each team concedes to opponents with pre-computed rankings from Balldontlie API. Filtered to season_type = 'regular'. One row per team/season."
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - team_id
              - season
    columns:
      - name: team_id
        description: "Unique identifier for the team"
        tests:
          - not_null
      - name: season
        description: "Season year (converted to INT64)"
        tests:
          - not_null

  - name: stg_team_season_averages_playtypes
