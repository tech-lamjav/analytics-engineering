  - name: stg_futebol_odds
    description: "Flatten + UNNEST 2× (bets→values) do raw_futebol_odds — alimenta fact_odds_snapshot → o motor de de-vig/EV. Grain lógico (fixture_id, bookmaker_id, market_id, outcome_label, collection_window), MAS a API repete linhas por design — SEM teste de unicidade aqui (o dedup acontece em fact_odds_snapshot, mesmo padrão de stg_futebol_injuries). Mantém TODOS os mercados/casas e odds raw/NULL; o afunilamento p/ os 8 mercados-alvo e o filtro odd_decimal>1.0 são no fato."
    columns:
      - name: fixture_id
        description: "ID do jogo na API-Football (FK p/ fact_fixtures)"
        tests:
          - not_null
      - name: bookmaker_id
        description: "ID da casa (4 = Pinnacle/sharp de referência, 8 = Bet365...)"
        tests:
          - not_null
      - name: market_id
        description: "ID do mercado (bet.id): 1=Match Winner, 4=Asian Handicap, 5=Goals O/U, 6=O/U 1st Half, 7=HT/FT, 8=BTTS, 10=Exact Score, 12=Double Chance..."
        tests:
          - not_null
      - name: outcome_label
        description: "Rótulo do outcome (value) — já embute a linha do mercado (ex: 'Over 2.5', 'Home -0.5', '0:0'); (market_id, outcome_label) é único por (fixture, casa, janela)"
        tests:
          - not_null
      - name: odd_decimal
        description: "Odd decimal (FLOAT64; SAFE_CAST de STRING). Pode ser NULL no staging — o filtro >1.0 é aplicado em fact_odds_snapshot"
      - name: league_id
        description: "ID da liga (71 = Brasileirão, 1 = Copa do Mundo). Base do competition"
      - name: season
        description: "Ano da temporada"
      - name: collection_window
        description: "Janela da coleta: 't24h' (abertura ~24h antes) | 't1h' (perto do fechamento)"
      - name: collection_timestamp
        description: "TIMESTAMP (UTC) da coleta — chave de partição (DATE) no fato"
      - name: kickoff_utc
        description: "TIMESTAMP UTC do kickoff (TIMESTAMP_SECONDS do unix) — base de minutes_to_kickoff"
      - name: api_update
        description: "TIMESTAMP da última atualização das odds na API (campo `update`)"
      - name: bookmaker_name
        description: "Nome da casa (cluster key no fato)"
      - name: market_name
        description: "Nome do mercado (bet.name)"
      - name: loaded_at
        description: "Timestamp ISO UTC do extractor"
